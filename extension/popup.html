<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h2 {
            color: #1a73e8;
            margin: 0 0 15px 0;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .start-btn {
            background: #1a73e8;
            color: white;
        }
        .stop-btn {
            background: #dc3545;
            color: white;
        }
        .start-btn:hover {
            background: #1557b0;
        }
        .stop-btn:hover {
            background: #c82333;
        }
        .info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>SignLink</h2>
    
    <div id="status" class="status disconnected">
         Server is Disconnected!
    </div>
    
    <button id="startBtn" class="start-btn">Start</button>
    <button id="stopBtn" class="stop-btn" style="display:none;">Disconnect From Server</button>
    
    <div class="info">
        <p>Sever Should Be Conneted</p>
        <p>http://localhost:8000</p>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
